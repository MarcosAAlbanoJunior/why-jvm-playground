# Sobe Postgres + a aplicacao COM o agente why-jvm anexado + o why-jvm-mcp,
# tudo no mesmo compose (mesma rede). O agente captura o incidente e ENCAMINHA
# para o why-jvm-mcp (http://why-jvm-mcp:9090), que roda o LLM e
# despacha o laudo.
#
# Os jars do agente vem de releases publicadas no GitHub (ver Dockerfile, estagio
# runtime-whyjvm), entao EXIGE a release publicada (WHYJVM_RELEASE). O
# why-jvm-mcp usa a imagem publicada no Docker Hub (marcosaaj/why-jvm-mcp).
#
# Uso:
#   docker compose up --build
# Depois abra http://localhost:8080, dispare um cenario (ex.: GET /api/faults/checkout)
# e veja o laudo: docker compose logs -f why-jvm-mcp
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: whyjvm
      POSTGRES_USER: whyjvm
      POSTGRES_PASSWORD: whyjvm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whyjvm -d whyjvm"]
      interval: 3s
      timeout: 3s
      retries: 10

  why-jvm-mcp:
    image: marcosaaj/why-jvm-mcp:latest
    ports:
      # Exposto no host para curl direto (GET /healthz). O app fala por DNS interno.
      - "9090:9090"
    environment:
      WHYJVM_ADDR: ":9090"
      # Sem auth no ingest (dev). Para exigir token, use o MESMO valor aqui e em
      # whyjvm.forward.token no app.
      WHYJVM_INGEST_TOKEN: ""
      WHYJVM_AUTO_INVESTIGATE: "true"
      # Provider do agente: stub (default, sem key) | claude | gemini. Para analise
      # real, troque e informe a key correspondente abaixo.
      WHYJVM_LLM_PROVIDER: "stub"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"

      # Use log ou slack para definir o canal do laudo, pelo log sera no log da aplicação
      # pelo slack sera no chat do webhook configurado em WHYJVM_SLACK_WEBHOOK_URL.
      WHYJVM_SINK: "log"
      WHYJVM_SLACK_WEBHOOK_URL: "${WEBHOOK_SLACK:-}"
    volumes:
      - ./incidents-store:/app/incidents-store
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      target: runtime-whyjvm
      args:
        OTEL_AGENT_VERSION: "2.28.1"
        WHYJVM_RELEASE: "v0.1.0-rc6"
    depends_on:
      db:
        condition: service_healthy
      why-jvm-mcp:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/whyjvm
      SPRING_DATASOURCE_USERNAME: whyjvm
      SPRING_DATASOURCE_PASSWORD: whyjvm
      # Pool pequeno de proposito: o cenario de exaustao precisa de poucas chamadas.
      DB_POOL_SIZE: "5"
